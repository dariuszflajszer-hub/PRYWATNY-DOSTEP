<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="manifest" href="manifest.webmanifest">
<title>Prywatny Dostęp</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#f4f7fb 0%,#e7edf5 100%);color:#1d2430;text-align:center;min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;width:420px;height:420px;background:radial-gradient(circle,rgba(255,60,48,.18) 0%,rgba(255,60,48,0) 70%);top:-120px;right:-120px;pointer-events:none}
.container{padding:40px 24px 60px;max-width:520px;margin:auto}
.logo{width:160px;margin:40px auto 20px;filter:drop-shadow(0 12px 24px rgba(180,0,16,.22))}
h1{font-size:42px;margin-bottom:18px;font-weight:700;letter-spacing:-1px}
.subtitle{font-size:20px;line-height:1.6;color:#586273;margin-bottom:36px}
.card{background:rgba(255,255,255,.72);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.5);border-radius:28px;padding:34px 28px;box-shadow:0 18px 45px rgba(29,36,48,.12);margin-bottom:22px}
.arrival-card{background:rgba(255,255,255,.58)}
h2{font-size:32px;margin-bottom:16px;color:#1d2430}
p{font-size:18px;line-height:1.7;color:#586273}
.button{display:block;width:100%;padding:22px;margin-top:30px;border:none;border-radius:18px;font-size:22px;font-weight:700;cursor:pointer;background:linear-gradient(180deg,#ff3b30 0%,#cc0014 100%);color:#fff;box-shadow:0 14px 28px rgba(204,0,20,.28);transition:transform .15s ease}
.button:active{transform:scale(.98)}
.secondary-button{background:#fff;color:#cc0014;border:1px solid rgba(204,0,20,.18);box-shadow:0 12px 24px rgba(29,36,48,.09);font-size:19px;margin-top:22px}
.status{display:none;margin-top:18px;padding:14px;border-radius:14px;background:rgba(204,0,20,.08);color:#8c0010;font-size:15px;line-height:1.5}
.small{margin-top:36px;font-size:14px;color:#7b8796}
</style>
</head>
<body>
<div class="container">
<img class="logo" src="icon.svg" alt="Prywatny Dostęp">
<h1>Dojazd na prezentację</h1>
<div class="subtitle">Otwórz trasę i rozpocznij dojazd do nieruchomości.</div>
<div class="card">
<h2>Uruchom trasę</h2>
<p>Naciśnij przycisk poniżej,<br>aby przejść do nawigacji.</p>
<button class="button" onclick="openNavigation()">Rozpocznij dojazd</button>
</div>
<div class="card arrival-card">
<h2>Po przybyciu</h2>
<p>Możesz włączyć powiadomienie,<br>że jesteś już na miejscu.</p>
<button class="button secondary-button" onclick="enableArrivalNotification()">Włącz powiadomienie o przybyciu</button>
<div id="arrivalStatus" class="status"></div>
</div>
<div class="small">Prywatny Dostęp</div>
</div>
<script>
function openNavigation(){
const lat=52.2297;
const lng=21.0122;
const url=`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
window.location.href=url;
}
async function enableArrivalNotification(){
const status=document.getElementById('arrivalStatus');
status.style.display='block';
if(!('Notification' in window)){
status.textContent='Ta przeglądarka nie obsługuje powiadomień.';
return;
}
try{
const permission=await Notification.requestPermission();
if(permission==='granted'){
status.textContent='Powiadomienie o przybyciu zostało włączone.';
new Notification('Prywatny Dostęp',{body:'Jesteś już na miejscu. Dziękujemy za przybycie.'});
}else{
status.textContent='Powiadomienia nie zostały włączone.';
}
}catch(error){
status.textContent='Nie udało się włączyć powiadomień na tym urządzeniu.';
}
}
</script>
</body>
</html>
