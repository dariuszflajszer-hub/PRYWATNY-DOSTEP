<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="manifest" href="manifest.webmanifest">
<title>Prywatny Dostęp</title>
<style>
body{margin:0;padding:0;font-family:Arial,sans-serif;background:#111;color:#fff;text-align:center}
.container{padding:40px 24px;max-width:500px;margin:auto}
h1{font-size:40px;margin-top:120px;margin-bottom:40px;font-weight:700}
.card{background:#1f1f1f;border-radius:20px;padding:36px 24px}
h2{font-size:34px;margin-bottom:20px}
p{color:#ccc;font-size:18px;line-height:1.6}
.button{display:block;width:100%;padding:22px;margin-top:30px;border:none;border-radius:16px;font-size:22px;font-weight:bold;cursor:pointer;background:#fff;color:#000}
.small{margin-top:40px;color:#777;font-size:14px}
</style>
</head>
<body>
<div class="container">
<h1>Dojazd na prezentację</h1>
<div class="card">
<h2>Uruchom trasę</h2>
<p>Kliknij poniżej, aby rozpocząć dojazd do nieruchomości.</p>
<button class="button" onclick="openNavigation()">Rozpocznij dojazd</button>
</div>
<div class="small">Prywatny Dostęp</div>
</div>
<script>
function openNavigation(){
const lat=52.2297;
const lng=21.0122;
const url=`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
window.location.href=url;
}
</script>
</body>
</html>
